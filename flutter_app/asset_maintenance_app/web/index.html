<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Asset Maintenance Pro - Professional Mobile App">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Asset Maintenance Pro">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Asset Maintenance Pro</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="stylesheet" type="text/css" href="flutter_bootstrap.css" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" type="text/css" href="flutter_bootstrap.css" media="(prefers-color-scheme: dark)">
  <script defer src="flutter.js"></script>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto Oxygen, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", sans-serif;
    }
  </style>
</head>
<body>
  <script>
    window.addEventListener('flutter-initialized', function() {
      console.log('Flutter app initialized');
    });
    _flutter.loader.loadEntrypoint({
      serviceWorkerVersion: null,
    }).then(function(engineInitializer) {
      return engineInitializer.initializeEngine();
    }).then(function(appRunner) {
      return appRunner.runApp();
    });
  </script>
</body>
</html>
