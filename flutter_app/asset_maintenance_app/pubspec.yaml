name: asset_maintenance_app
description: Professional Asset Maintenance Mobile Application
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI/UX
  flutter_svg: ^2.0.7
  cupertino_icons: ^1.0.2
  intl: ^0.19.0

  # Navigation
  go_router: ^13.0.0

  # Image handling
  image_picker: ^1.0.4
  image_cropper: ^7.0.0
  cached_network_image: ^3.3.0

  # Notifications
  flutter_local_notifications: ^16.1.0
  firebase_messaging: ^14.7.0
  firebase_core: ^2.24.0

  # Logging
  logger: ^2.1.0

  # Utils
  get_it: ^7.6.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  freezed: ^2.4.6
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.0
  custom_lint: ^4.0.0
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
